<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Scalio — Full-Service Amazon FBA Agency</title>
    <meta
      name="description"
      content="The Scalio is a full-service Amazon FBA agency helping brands launch, scale, and dominate on Amazon with end-to-end management, PPC, listing optimization, and supply chain solutions."
    />
    <meta name="author" content="The Scalio" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://thescalio.com" />

    <meta
      property="og:title"
      content="The Scalio — Full-Service Amazon FBA Agency"
    />
    <meta
      property="og:description"
      content="Launch, scale, and dominate on Amazon. End-to-end FBA management by The Scalio."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://thescalio.com/favicon.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://thescalio.com/favicon.svg" />

    <!-- Organization + ProfessionalService schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "The Scalio",
        "url": "https://thescalio.com",
        "description": "Full-service Amazon FBA agency — product launch, PPC, listing optimization, and supply chain management.",
        "priceRange": "$$",
        "areaServed": "Worldwide",
        "serviceType": "Amazon FBA Management",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@thescalio.com",
          "contactType": "sales"
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Amazon FBA Services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Product Research & Launch",
                "description": "Market analysis, competitor mapping, keyword architecture, listing creation, and launch PPC campaigns."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Amazon PPC Management",
                "description": "Daily-optimized ad campaigns across Sponsored Products, Brands, Display, and DSP."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Listing Optimization",
                "description": "Conversion-focused copywriting, A+ Content design, backend keyword optimization, and image strategy."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Supply Chain & Logistics",
                "description": "Demand forecasting, freight forwarding, FBA prep, and multi-warehouse distribution."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Account Health & Compliance",
                "description": "Policy compliance monitoring, listing suppression resolution, and reinstatement support."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Brand Growth & Expansion",
                "description": "Multi-marketplace expansion, Walmart launch, and omnichannel strategy."
              }
            }
          ]
        }
      }
    </script>

    <!-- FAQPage schema for rich snippets — synced with FAQSection.tsx (11 Qs) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long before I see results?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most clients see measurable improvements within 30-60 days. Rankings move first, then revenue growth at 60-90 days."
            }
          },
          {
            "@type": "Question",
            "name": "Do you work with new launches or existing listings?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Both. New launches get a full go-to-market strategy. Existing listings get optimized for maximum conversion and rank."
            }
          },
          {
            "@type": "Question",
            "name": "How much of my time does this take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "After onboarding (30 min) and strategy approval (15 min), your ongoing commitment is one 30-minute weekly call. We handle everything else."
            }
          },
          {
            "@type": "Question",
            "name": "What access do you need to my Seller Central account?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We use Amazon's built-in user permissions. We never ask for your main login. You can revoke access in one click at any time."
            }
          },
          {
            "@type": "Question",
            "name": "What does pricing look like?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Starter plans begin at $2,500/month. Growth and Enterprise tiers are custom-quoted. Every engagement starts with a free audit."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to sign a long-term contract?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Month-to-month agreements. No lock-ins, no cancellation fees. Most clients stay 12+ months because of results."
            }
          },
          {
            "@type": "Question",
            "name": "What if I'm not happy with the results?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can pause or cancel anytime — no penalties. We'll work with you to diagnose issues and adjust strategy first."
            }
          },
          {
            "@type": "Question",
            "name": "What makes you different from other Amazon agencies?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We've managed over $50M in Amazon revenue across 200+ brands. Dedicated account managers, not junior VAs. Direct access to the people doing the work."
            }
          },
          {
            "@type": "Question",
            "name": "What results can I expect in 30, 60, and 90 days?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "30 days: PPC restructured, listings optimized. 60 days: 15-30% conversion improvement. 90 days: 2-5x revenue trajectory established."
            }
          },
          {
            "@type": "Question",
            "name": "Will I have visibility into what you're doing?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Real-time dashboard, weekly strategy calls, dedicated Slack channel. Full transparency is non-negotiable."
            }
          },
          {
            "@type": "Question",
            "name": "Do you manage PPC or just listings?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Full stack: listing copywriting, A+ Content, PPC, keyword strategy, inventory planning, and marketplace expansion under one roof."
            }
          }
        ]
      }
    </script>

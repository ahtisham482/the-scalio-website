  <head>
    <meta charset="UTF-8" />

    <title>The Scalio — Full-Service Amazon FBA Agency</title>
    <meta
      name="description"
      content="The Scalio is a full-service Amazon FBA agency helping brands launch, scale, and dominate on Amazon with end-to-end management, PPC, listing optimization, and supply chain solutions."
    />
    <meta name="author" content="The Scalio" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://thescalio.com" />

    <meta
      property="og:title"
      content="The Scalio — Full-Service Amazon FBA Agency"
    />
    <meta
      property="og:description"
      content="Launch, scale, and dominate on Amazon. End-to-end FBA management by The Scalio."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://thescalio.com/favicon.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://thescalio.com/favicon.svg" />

    <!-- Organization + ProfessionalService schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "The Scalio",
        "url": "https://thescalio.com",
        "description": "Full-service Amazon FBA agency — product launch, PPC, listing optimization, and supply chain management.",
        "priceRange": "$$",
        "areaServed": "Worldwide",
        "serviceType": "Amazon FBA Management",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@thescalio.com",
          "contactType": "sales"
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Amazon FBA Services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Product Research & Launch",
                "description": "Market analysis, competitor mapping, keyword architecture, listing creation, and launch PPC campaigns."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Amazon PPC Management",
                "description": "Daily-optimized ad campaigns across Sponsored Products, Brands, Display, and DSP."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Listing Optimization",
                "description": "Conversion-focused copywriting, A+ Content design, backend keyword optimization, and image strategy."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Supply Chain & Logistics",
                "description": "Demand forecasting, freight forwarding, FBA prep, and multi-warehouse distribution."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Account Health & Compliance",
                "description": "Policy compliance monitoring, listing suppression resolution, and reinstatement support."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Brand Growth & Expansion",
                "description": "Multi-marketplace expansion, Walmart launch, and omnichannel strategy."
              }
            }
          ]
        }
      }
    </script>

    <!-- FAQPage schema for rich snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long before I see results?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most clients see measurable improvements within 30-60 days. Keyword rankings and organic traffic typically move first, followed by revenue growth at 60-90 days."
            }
          },
          {
            "@type": "Question",
            "name": "What does pricing look like?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Starter plans begin at $2,500/month for brands doing under $50K in monthly revenue. Growth and Enterprise tiers are custom-quoted based on SKU count, ad spend, and marketplace coverage."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to sign a long-term contract?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. We work on month-to-month agreements. No lock-ins, no cancellation fees. We earn your business every month with results."
            }
          },
          {
            "@type": "Question",
            "name": "What makes you different from other Amazon agencies?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We're operators, not consultants. Our team has managed over $50M in Amazon revenue across 200+ brands with proprietary data tools and daily PPC optimization."
            }
          },
          {
            "@type": "Question",
            "name": "What results can I expect in 30, 60, and 90 days?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "30 days: Listings optimized, PPC restructured. 60 days: 15-30% conversion improvement, ACoS reduction. 90 days: 2-5x revenue growth trajectory established."
            }
          },
          {
            "@type": "Question",
            "name": "Do you manage PPC or just listings?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We manage the full stack — listing copywriting, A+ Content, PPC, keyword strategy, inventory planning, and marketplace expansion. Everything under one roof."
            }
          }
        ]
      }
    </script>
